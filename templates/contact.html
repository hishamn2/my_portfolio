{% extends "layout.html" %}

{% block body %}
<section class="section">
    <div class="container">
        <h1 class="title is-2">Get in Touch</h1>
        <p class="subtitle">I am always open to discussing <strong>Systems Programming</strong> or <strong>Data Science</strong> opportunities.</p>

        <div class="columns is-centered">
            <div class="column is-6">
                <form action="/contact" method="post" class="box">
                    <div class="field">
                        <label class="label">Name</label>
                        <div class="control">
                            <input class="input" type="text" name="name" placeholder="Your Name" required>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Email</label>
                        <div class="control">
                            <input class="input" type="email" name="email" placeholder="email@example.com" required>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Message</label>
                        <div class="control">
                            <textarea class="textarea" name="message" placeholder="How can I help you?" required></textarea>
                        </div>
                    </div>

                    <div class="control">
                        <button type="submit" class="button is-link is-fullwidth">Send Message</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
