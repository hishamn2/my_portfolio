{% extends "layout.html" %}

{% block body %}
<div class="box has-text-centered mb-6 hero-custom">
    <h1 class="title is-2">Hicham Naouchi</h1>
    <p class="subtitle is-5">Systems & Data Science</p>
</div>

<div class="columns is-multiline">
    {% for project in projects %}
    <div class="column is-4">
        <div class="box project-card">
            <span class="tag is-link is-light is-pulled-right">{{ project.category }}</span>
            <h3 class="title is-5 mt-2">{{ project.title }}</h3>
            <p class="content is-small text-muted">{{ project.description }}</p>

            <div class="tags mt-3">
                <span class="tag is-dark is-rounded is-small">{{ project.tech_stack }}</span>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
