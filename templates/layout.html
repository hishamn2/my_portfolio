<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hicham Naouchi | Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column; /* Stack elements vertically */
            background-color: #1a1a1a;
            color: #ffffff;
        }

        main {
            flex: 1 0 auto; /* This tells the main content to GROW and fill the white space */
        }

        footer {
            flex-shrink: 0; /* Ensures the footer stays its original size at the bottom */
            background-color: #121212 !important;
            border-top: 1px solid #333;
            color: #888;
            padding: 2rem 0;
        }

        /* Nav & Theme Styles */
        .navbar { background-color: #121212 !important; min-height: 3.5rem; }
        .navbar-item, .navbar-link { color: #ffffff !important; }
        .navbar-burger { color: #ffffff !important; }
        
        @media screen and (max-width: 1023px) {
            .navbar-menu { background-color: #121212 !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item" href="{{ url_for('index') }}">
                <strong style="color: white; letter-spacing: 2px;">HICHAM</strong>
            </a>

            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarMain">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>

        <div id="navbarMain" class="navbar-menu">
            <div class="navbar-end">
                <a class="navbar-item" href="{{ url_for('index') }}">Home</a>
                <a class="navbar-item" href="{{ url_for('about') }}">About</a>
                <a class="navbar-item" href="{{ url_for('contact') }}">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        {% block body %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="content has-text-centered">
            <p>&copy; 2026 Hicham Naouchi. Built with Flask & SQL.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
            if ($navbarBurgers.length > 0) {
                $navbarBurgers.forEach( el => {
                    el.addEventListener('click', () => {
                        const target = el.dataset.target;
                        const $target = document.getElementById(target);
                        el.classList.toggle('is-active');
                        $target.classList.toggle('is-active');
                    });
                });
            }
        });
    </script>
</body>
</html>
